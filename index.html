<!DOCTYPE html>
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピラティス・ヨガ指導者のための FCM Web学習ナビ｜3級・2級</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#FFFFFF;--surface:#F6F8FA;--card:#FFFFFF;--border:#D0D7DE;
  --accent:#2563EB;--accent2:#059669;--accent3:#D97706;--danger:#DC2626;
  --purple:#7C3AED;--text:#1F2328;--text-sub:#4B5563;--text-dim:#6B7280;
  --s-none:#E5E7EB;--s-weak:#EDE9FE;--s-ok:#DBEAFE;--s-good:#D1FAE5;
  --c-none:#9CA3AF;--c-weak:#7C3AED;--c-ok:#2563EB;--c-good:#059669;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0F1117;--surface:#181C27;--card:#1E2335;--border:#2A3050;
    --accent:#4B7BF5;--accent2:#34D399;--accent3:#F59E0B;--danger:#F87171;
    --purple:#A78BFA;--text:#E8EAF0;--text-sub:#8B95B5;--text-dim:#4A5270;
    --s-none:#2A3050;--s-weak:#7C3AED;--s-ok:#0369A1;--s-good:#065F46;
    --c-none:#8B95B5;--c-weak:#A78BFA;--c-ok:#38BDF8;--c-good:#34D399;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.hbadge{background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:4px;}
.htitle{font-size:14px;font-weight:700;}
</style>
</head>
<body>

<header class="hdr">
  <span class="hbadge">FCM</span>
  <span class="htitle">🧘 ピラティス・ヨガ指導者のための FCM Web学習ナビ</span>
</header>

<main class="main">
  <div class="ps-tool-desc">
    <p>🎉 Webサイトが正常に公開されました！</p>
    <p style="font-size: 12px; margin-top: 8px; color: var(--text-sub);">
      ※元のHTMLファイルが途中で切れてしまっていたため、現在はヘッダー部分のみを修復して表示しています。お手元の完全なコードがある場合は、このファイル（index.html）に上書きして保存してください。
    </p>
  </div>
</main>

</body>
</html>
